name: Build prebuilt native artifacts

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    name: Build artifacts
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Setup Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          profile: minimal
          override: true

      - name: Install NASM (needed for building boringssl)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y nasm

      - name: Install NASM (macOS)
        if: runner.os == 'macOS'
        run: brew install nasm

      - name: Install NASM (Windows)
        if: runner.os == 'Windows'
        run: choco install nasm -y

      - name: Install dependencies
        run: npm ci

      - name: Build napi artifacts
        run: npm run artifacts

      - name: Package artifacts
        run: |
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            powershell -Command "if(Test-Path artifacts){ Compress-Archive -Path artifacts\* -DestinationPath qore-artifact-windows.zip }"
          else
            zip -r qore-artifact-${{ matrix.os }}.zip artifacts || true
          fi

      - name: Upload artifact zip
        uses: actions/upload-artifact@v4
        with:
          name: qore-artifact-${{ matrix.os }}
          path: |
            qore-artifact-${{ matrix.os }}.zip
            qore-artifact-windows.zip

  release:
    name: Create Release and attach artifacts
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download linux artifact
        uses: actions/download-artifact@v4
        with:
          name: qore-artifact-ubuntu-latest
          path: ./artifacts/ubuntu

      - name: Download mac artifact
        uses: actions/download-artifact@v4
        with:
          name: qore-artifact-macos-latest
          path: ./artifacts/macos

      - name: Download windows artifact
        uses: actions/download-artifact@v4
        with:
          name: qore-artifact-windows-latest
          path: ./artifacts/windows

      - name: Create GitHub Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref_name }}
          release_name: ${{ github.ref_name }}
          draft: false
          prerelease: false

      - name: Upload release assets
        uses: softprops/action-gh-release@v1
        with:
          files: |
            ./artifacts/ubuntu/qore-artifact-ubuntu-latest.zip
            ./artifacts/macos/qore-artifact-macos-latest.zip
            ./artifacts/windows/qore-artifact-windows-latest.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
