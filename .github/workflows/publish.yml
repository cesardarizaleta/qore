name: Automate CD to NPM

env:
  DEBUG: napi:*
  APP_NAME: qore-quic
  MACOSX_DEPLOYMENT_TARGET: '10.13'

on:
  push:
    branches:
      - main

jobs:
  bump-version:
    if: "!startsWith(github.event.head_commit.message, 'chore(release)')"
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      new_version: ${{ steps.bump.outputs.ver }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Config Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump version
        id: bump
        run: |
          # Bump version in package.json only (skip scripts to avoid napi version
          # which needs npm/ sub-package dirs that don't exist in the repo)
          npm version patch --no-git-tag-version --ignore-scripts
          NEW_VER=$(node -p "require('./package.json').version")

          # Sync optionalDependencies to the new version
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf-8'));
            if (pkg.optionalDependencies) {
              for (const key of Object.keys(pkg.optionalDependencies)) {
                pkg.optionalDependencies[key] = pkg.version;
              }
            }
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "

          # Clean up stale tag if it exists (from a failed prior run)
          git push origin ":refs/tags/v${NEW_VER}" 2>/dev/null || true
          git tag -d "v${NEW_VER}" 2>/dev/null || true

          # Commit, tag, and push
          git add -A
          git commit -m "chore(release): ${NEW_VER}"
          git tag "v${NEW_VER}"
          git push origin main --follow-tags
          echo "ver=v${NEW_VER}" >> $GITHUB_OUTPUT

  build:
    needs: bump-version
    strategy:
      fail-fast: false
      matrix:
        settings:
          - host: windows-latest
            target: x86_64-pc-windows-msvc
          - host: macos-latest
            target: aarch64-apple-darwin
          - host: ubuntu-latest
            target: x86_64-unknown-linux-gnu

    name: Build - ${{ matrix.settings.target }}
    runs-on: ${{ matrix.settings.host }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.bump-version.outputs.new_version }}

      - name: Setup node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install
        run: npm ci

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.settings.target }}

      - name: Build native binary
        run: npx napi build --platform --release

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: bindings-${{ matrix.settings.target }}
          path: "*.node"
          if-no-files-found: error

  publish:
    name: Publish
    needs: [bump-version, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.bump-version.outputs.new_version }}

      - name: Setup node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Move artifacts to root
        run: |
          mv artifacts/bindings-*/*.node .
          echo "Native bindings found:"
          ls -la *.node

      - name: Create platform sub-packages
        run: npx napi prepublish -t npm --skip-gh-release

      - name: Publish platform sub-packages
        run: |
          for dir in npm/*/; do
            if [ -d "$dir" ]; then
              echo "📦 Publishing $dir..."
              (cd "$dir" && npm publish --access public) || true
            fi
          done
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Build TypeScript (generate dist/)
        run: node scripts/fix-types.js && npx tsc

      - name: Publish main package to NPM
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
